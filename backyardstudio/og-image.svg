<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#12150e"/>
  <!-- Procedural grass strip across the bottom -->
  <rect x="0" y="450" width="1200" height="180" fill="#4a6a40"/>
  <rect x="0" y="450" width="1200" height="180" fill="url(#grassDots)" opacity="0.5"/>
  <defs>
    <pattern id="grassDots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="14" r="2" fill="#5d7e4a"/>
      <circle cx="26" cy="6" r="1.5" fill="#5d7e4a"/>
      <circle cx="32" cy="28" r="2" fill="#5d7e4a"/>
      <circle cx="14" cy="32" r="1.5" fill="#5d7e4a"/>
    </pattern>
  </defs>
  <!-- Cream house silhouette on the right -->
  <g transform="translate(820 360)">
    <rect x="0" y="40" width="320" height="160" fill="#e8d8b8"/>
    <polygon points="-10,40 330,40 240,-30 80,-30" fill="#1a1612"/>
    <rect x="240" y="-50" width="22" height="80" fill="#eae0c8"/>
    <rect x="40" y="80" width="60" height="80" fill="#506a82"/>
    <rect x="220" y="80" width="60" height="80" fill="#506a82"/>
  </g>
  <!-- Tree on the left -->
  <g transform="translate(220 360)">
    <ellipse cx="0" cy="-90" rx="160" ry="135" fill="#3f7240"/>
    <ellipse cx="-80" cy="-40" rx="105" ry="85" fill="#4a8245"/>
    <ellipse cx="90" cy="-60" rx="85" ry="70" fill="#5a8e4a"/>
    <rect x="-22" y="20" width="44" height="160" rx="6" fill="#5a4028"/>
  </g>
  <!-- Title block (top-left) -->
  <g transform="translate(80 110)">
    <circle cx="0" cy="-12" r="8" fill="#d4a574"/>
    <text x="20" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="500" fill="#f2ede0">Backyard Studio</text>
  </g>
  <text x="80" y="160" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#d4a574" letter-spacing="6">3D LANDSCAPE PLANNER</text>
  <text x="80" y="230" font-family="Georgia, serif" font-size="32" fill="#9ea290" font-style="italic">Drop trees, beds, hardscape · watch shadows sweep through the day</text>
</svg>
